# Historical Stablecoin Stress Event Windows
# Tiered data availability catalogue for StressBench benchmark
#
# Tiers:
#   A: Execution-grade — full L2, VWAP labels computable
#   B: Price-grade — OHLCV/DEX/trades available, no full L2
#   C: Context-grade — partial data, historical context only
#
# coverage_score: 0.25 (C) / 0.50 (B) / 0.75 (A-partial) / 1.0 (A-full)

events:

  iron_titan_2021:
    stablecoins: [IRON]
    mechanism: "Algorithmic stablecoin bank run; TITAN governance token collapse; IRON redeemability failed"
    start: "2021-06-16T00:00:00Z"
    end: "2021-06-17T23:59:59Z"
    data_tier: C
    data_sources:
      - coingecko_ohlcv
      - polygon_dex_swaps
    empirical_use: "Taxonomy context only; no benchmark tasks"
    coverage_score: 0.25
    notes: >
      IRON was traded exclusively on QuickSwap (Polygon DEX). No CEX L2 depth available.
      Benchmark venues (Binance/Coinbase/Kraken) had minimal exposure.
      Terminal depeg: IRON to $0, TITAN to $0 in <24 hours.

  terra_ust_2022:
    stablecoins: [UST, USDT, DAI]
    mechanism: "Algorithmic stablecoin death spiral; LUNA mint/burn mechanism failure; Anchor Protocol run"
    start: "2022-05-07T00:00:00Z"
    end: "2022-05-14T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - coinbase_ohlcv
      - kraken_ohlcv
      - curve_pool_reserves
      - terra_onchain_transactions
    empirical_use: "Validation split illustrative; price-basis claims only"
    coverage_score: 0.50
    notes: >
      UST terminal depeg (-98%). USDT brief stress (<15 bps), USDC minimal (<10 bps).
      Contagion to USDC/USDT too brief for label construction.
      Curve 3pool imbalance was a 12h leading indicator (documented in Cintra & Holloway 2023).
      Maps to terra_luna_2022 window in event_windows.yaml (split=validation).

  ftx_collapse_2022:
    stablecoins: [USDT, USDC, DAI]
    mechanism: "Exchange insolvency shock; FTX balance sheet fraud revealed; withdrawal halt"
    start: "2022-11-06T00:00:00Z"
    end: "2022-11-12T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - coinbase_ohlcv
      - kraken_ohlcv
      - binance_partial_orderbook
      - usdt_onchain_movements
    empirical_use: "Illustrative exchange-specific credit shock; not in benchmark splits"
    coverage_score: 0.50
    notes: >
      USDT peak -20 bps (Kraken); USDC -5 bps.
      Stress was exchange-specific (FTX); benchmark venues show small contagion.
      No full L2 tape in benchmark dataset for this period.
      Demonstrates exchange credit shocks produce smaller dislocations than reserve shocks.

  busd_regulatory_2023:
    stablecoins: [BUSD, USDC, USDT]
    mechanism: "Regulatory enforcement; NYDFS halts BUSD minting; Binance conversion program"
    start: "2023-02-13T00:00:00Z"
    end: "2023-03-08T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - binance_partial_orderbook
      - paxos_attestation_reports
    empirical_use: "Illustrative regulatory winddown dynamics; not in primary benchmark splits"
    coverage_score: 0.50
    notes: >
      BUSD peak -30 bps during conversion rush; USDC/USDT +10 bps appreciation as conversion destination.
      Occurred 3 weeks before SVB event; may explain elevated Q1 2023 basis volatility.
      BUSD not a primary benchmark asset.
      Full L2 tape available via Binance archive but not integrated into benchmark dataset.

  usdc_svb_2023:
    stablecoins: [USDC, DAI, USDT]
    mechanism: "Reserve bank insolvency; SVB seized by FDIC; Circle held ~$3.3B (~8% of reserves) at SVB"
    start: "2023-03-10T00:00:00Z"
    end: "2023-03-14T23:59:59Z"
    data_tier: A
    data_sources:
      - binance_real_l2_snapshot
      - coinbase_real_l2_snapshot
      - kraken_real_l2_snapshot
      - binance_trade_tape
      - coinbase_trade_tape
      - kraken_trade_tape
      - usdc_onchain_redemptions
    empirical_use: "PRIMARY benchmark test split; all paper claims anchored here"
    coverage_score: 1.0
    notes: >
      USDC peak -1300 bps (~$0.87). DAI -200 bps (USDC-backed collateral). USDT +50 bps premium.
      Real L2 depth captured during event for all benchmark venues.
      Full net_profit_bps labels computable at all notional sizes.
      Oracle earns 161-225 net bps/trade; all models produce negative net bps.
      12x price-to-execution gap: 35% price-basis positive vs 2.88% executable at $10K.
      Maps to usdc_depeg_2023 in event_windows.yaml (split=test).

  usdc_svb_recovery_2023:
    stablecoins: [USDC, DAI, USDT]
    mechanism: "Post-SVB recovery; US Treasury+Fed+FDIC joint statement guaranteed full SVB deposits"
    start: "2023-03-15T00:00:00Z"
    end: "2023-04-01T23:59:59Z"
    data_tier: A
    data_sources:
      - binance_real_l2_snapshot
      - coinbase_real_l2_snapshot
      - kraken_real_l2_snapshot
      - binance_trade_tape
      - coinbase_trade_tape
    empirical_use: "Test split recovery window; validates regime generalization"
    coverage_score: 0.75
    notes: >
      USDC fully restored to $1.000 by Mar 15.
      Recovery window has very few executable arbitrage windows (label density near zero).
      Important for validating model false-positive rate drops post-recovery.
      On-chain recovery metrics (attestations, redemption volumes) not fully integrated.
      Maps to usdc_depeg_2023_recovery in event_windows.yaml (split=test boundary).

  usdt_curve_2023:
    stablecoins: [USDT, USDC, DAI]
    mechanism: "Curve pool imbalance; Tether reserve concerns re-emerge; brief USDT discount"
    start: "2023-06-12T00:00:00Z"
    end: "2023-06-15T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - coinbase_ohlcv
      - curve_pool_reserves
      - usdt_onchain_transfers
    empirical_use: "Out-of-sample illustrative; motivates on-chain Curve data integration"
    coverage_score: 0.50
    notes: >
      USDT peak -8 bps; USDC +3 bps premium. Very short duration (hours).
      Below benchmark test split window; insufficient label density at $10K notional.
      Curve pool data available but not integrated into benchmark dataset.
      Demonstrates on-chain DEX metrics may provide predictive signal for USDT stress.
