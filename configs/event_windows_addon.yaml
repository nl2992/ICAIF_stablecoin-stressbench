# Add-on event windows for extended robustness analysis
#
# Do NOT modify configs/event_windows.yaml (benchmark-freeze).
# These windows are additional stress and recovery periods for
# out-of-sample generalization experiments.
#
# Usage:
#   scripts/run_addon_experiments.py --event-config configs/event_windows_addon.yaml

addon_events:
  usdc_recovery_2023:
    split: addon_test
    start: "2023-03-15T00:00:00Z"
    end: "2023-04-01T00:00:00Z"
    description: "USDC post-SVB recovery and repeg period"
    notes: >
      Price basis compresses as USDC returns to peg. Tests whether models
      correctly reduce false positives as stress dissipates.

  usdt_curve_stress_2023:
    split: addon_test
    start: "2023-06-15T00:00:00Z"
    end: "2023-06-30T00:00:00Z"
    description: "USDT Curve pool stress period (Jun 2023)"
    notes: >
      USDT depegged briefly on Curve amid 3pool imbalance. Different
      stress mechanism from SVB (liquidity pool vs bank run).

  usdc_svb_extended:
    split: addon_test
    start: "2023-03-08T00:00:00Z"
    end: "2023-03-20T00:00:00Z"
    description: "Extended SVB window including pre-stress and recovery"
    notes: >
      Broader window around the primary test event to capture stress buildup
      and unwinding. Overlaps with the benchmark test split; use only for
      exploratory analysis, not for re-running baseline experiments.
